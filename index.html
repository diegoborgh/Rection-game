<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Reflex | 3D Reaction Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        bg: '#0F172A',
                        surface: '#1E293B',
                        primary: '#F1F5F9',
                        ready: '#10B981',
                        waiting: '#F59E0B',
                        results: '#3B82F6',
                        error: '#EF4444',
                        muted: '#94A3B8',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0F172A;
            color: #F1F5F9;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: default;
        }

        .ui-layer {
            position: relative;
            z-index: 20;
            pointer-events: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .pointer-events-auto {
            pointer-events: auto;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: all 0.2s ease;
        }
        
        .stat-card:hover {
            border-color: rgba(148, 163, 184, 0.3);
            transform: translateY(-2px);
        }

        .text-glow {
            text-shadow: 0 0 40px currentColor;
        }

        .game-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 0;
        }
    </style>
</head>
<body class="h-screen w-screen relative font-sans">

    <div id="canvas-container"></div>

    <div class="ui-layer max-w-6xl mx-auto px-6 py-6">
        
        <header class="text-center shrink-0">
            <h1 class="font-display text-4xl md:text-6xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 animate-float">
                NEURAL REFLEX
            </h1>
            <p class="text-muted text-xs md:text-sm font-medium tracking-[0.2em] uppercase mt-2 opacity-80">
                Click the core when it turns green
            </p>
        </header>

        <div id="game-stage" class="game-stage">
            <!-- Removed mb-4 to center text perfectly with 3D shape -->
            <div onclick="handleGameInteraction()" class="text-center pointer-events-auto select-none cursor-pointer">
                <h2 id="main-text" class="font-display text-3xl md:text-5xl font-bold text-primary transition-all duration-200 text-glow opacity-90">
                    Ready?
                </h2>
                <p id="sub-text" class="text-muted text-sm md:text-base font-light mt-1">
                    Tap the core to begin
                </p>
            </div>
        </div>

        <!-- Reduced gap and removed bottom margin to move stats higher -->
        <div class="shrink-0 flex flex-col items-center gap-3 pointer-events-auto">
            <div class="grid grid-cols-5 gap-2 md:gap-3 w-full max-w-3xl">
                <div class="stat-card rounded-xl p-2 md:p-3 flex flex-col items-center justify-center">
                    <span class="text-muted text-[9px] md:text-[10px] uppercase tracking-wider font-bold mb-1">Last</span>
                    <span id="stat-last" class="font-display text-lg md:text-2xl font-bold text-primary">--</span>
                </div>
                
                <div class="stat-card rounded-xl p-2 md:p-3 flex flex-col items-center justify-center">
                    <span class="text-muted text-[9px] md:text-[10px] uppercase tracking-wider font-bold mb-1">Avg</span>
                    <span id="stat-avg" class="font-display text-lg md:text-2xl font-bold text-results">--</span>
                </div>

                <div class="stat-card rounded-xl p-2 md:p-3 flex flex-col items-center justify-center">
                    <span class="text-muted text-[9px] md:text-[10px] uppercase tracking-wider font-bold mb-1">Best</span>
                    <span id="stat-best" class="font-display text-lg md:text-2xl font-bold text-ready">--</span>
                </div>

                <div class="stat-card rounded-xl p-2 md:p-3 flex flex-col items-center justify-center border-error/20">
                    <span class="text-error/70 text-[9px] md:text-[10px] uppercase tracking-wider font-bold mb-1">Failed</span>
                    <span id="stat-failed" class="font-display text-lg md:text-2xl font-bold text-error">0</span>
                </div>

                <div class="stat-card rounded-xl p-2 md:p-3 flex flex-col items-center justify-center">
                    <span class="text-muted text-[9px] md:text-[10px] uppercase tracking-wider font-bold mb-1">Tries</span>
                    <span id="stat-count" class="font-display text-lg md:text-2xl font-bold text-waiting">0</span>
                </div>
            </div>

            <button onclick="resetStats()" class="px-6 py-2 rounded-full border border-surface hover:bg-surface/50 text-muted hover:text-primary transition-all text-xs font-medium uppercase tracking-wider pointer-events-auto">
                Reset Data
            </button>
        </div>
    </div>

    <script>
        const STATE = {
            IDLE: 'IDLE',
            WAITING: 'WAITING',
            READY: 'READY',
            RESULT: 'RESULT',
            FALSE_START: 'FALSE_START'
        };

        let currentState = STATE.IDLE;
        let startTime = 0;
        let timerId = null;
        let stats = {
            attempts: [],
            count: 0,
            failed: 0,
            best: Infinity,
            average: 0
        };

        const els = {
            mainText: document.getElementById('main-text'),
            subText: document.getElementById('sub-text'),
            statLast: document.getElementById('stat-last'),
            statAvg: document.getElementById('stat-avg'),
            statBest: document.getElementById('stat-best'),
            statFailed: document.getElementById('stat-failed'),
            statCount: document.getElementById('stat-count'),
            gameStage: document.getElementById('game-stage'),
        };

        let audioContext = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        function playSound(type) {
            if (!audioContext) initAudio();
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            const now = audioContext.currentTime;
            
            if (type === 'start') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(600, now);
                oscillator.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                oscillator.start(now);
                oscillator.stop(now + 0.1);
            } 
            else if (type === 'error') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, now);
                oscillator.frequency.linearRampToValueAtTime(100, now + 0.2);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                oscillator.start(now);
                oscillator.stop(now + 0.2);
            }
            else if (type === 'success') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(1200, now);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                oscillator.start(now);
                oscillator.stop(now + 0.15);
            }
        }

        function handleGameInteraction() {
            initAudio();
            
            switch (currentState) {
                case STATE.IDLE:
                case STATE.RESULT:
                case STATE.FALSE_START:
                    playSound('start');
                    startGame();
                    break;
                case STATE.WAITING:
                    playSound('error');
                    triggerFalseStart();
                    break;
                case STATE.READY:
                    playSound('success');
                    recordResult();
                    break;
            }
        }

        function startGame() {
            els.gameStage.classList.remove('false-start-shake');
            setWaitingColors();
            
            currentState = STATE.WAITING;
            updateUI(STATE.WAITING);
            
            const delay = Math.floor(Math.random() * 4000) + 1000;
            
            timerId = setTimeout(() => {
                if (currentState === STATE.WAITING) {
                    currentState = STATE.READY;
                    startTime = performance.now();
                    updateUI(STATE.READY);
                    trigger3DAction('READY');
                }
            }, delay);
        }

        function setWaitingColors() {
            if (!solidMesh || !wireMesh) return;
            solidMesh.material.emissive.setHex(0x3B82F6);
            solidMesh.material.emissiveIntensity = 0.3;
            solidMesh.material.color.setHex(0x1E293B);
            wireMesh.material.color.setHex(0x3B82F6);
            wireMesh.material.opacity = 0.4;
            targetRotationSpeed = 0.002;
        }

        function triggerFalseStart() {
            clearTimeout(timerId);
            currentState = STATE.FALSE_START;
            
            stats.failed++;
            els.statFailed.textContent = stats.failed;
            
            updateUI(STATE.FALSE_START);
            trigger3DAction('FALSE_START');
            
            els.gameStage.classList.add('false-start-shake');
            setTimeout(() => {
                els.gameStage.classList.remove('false-start-shake');
            }, 500);
        }

        function recordResult() {
            const endTime = performance.now();
            const reactionTime = Math.round(endTime - startTime);
            
            stats.attempts.push(reactionTime);
            stats.count++;
            if (reactionTime < stats.best) stats.best = reactionTime;
            stats.average = Math.round(stats.attempts.reduce((a, b) => a + b, 0) / stats.attempts.length);
            
            els.statLast.textContent = reactionTime;
            els.statAvg.textContent = stats.average;
            els.statBest.textContent = stats.best === Infinity ? '--' : stats.best;
            els.statCount.textContent = stats.count;

            currentState = STATE.RESULT;
            updateUI(STATE.RESULT, reactionTime);
            trigger3DAction('RESULT');
        }

        function resetStats() {
            stats = { attempts: [], count: 0, failed: 0, best: Infinity, average: 0 };
            els.statLast.textContent = '--';
            els.statAvg.textContent = '--';
            els.statBest.textContent = '--';
            els.statFailed.textContent = '0';
            els.statCount.textContent = '0';
            currentState = STATE.IDLE;
            updateUI(STATE.IDLE);
            clearTimeout(timerId);
            reset3DScene();
            els.gameStage.classList.remove('false-start-shake');
        }

        function updateUI(state, data = null) {
            switch (state) {
                case STATE.IDLE:
                    els.mainText.textContent = "Ready?";
                    els.mainText.className = "font-display text-3xl md:text-5xl font-bold text-primary transition-all duration-200 text-glow";
                    els.subText.textContent = "Tap the core to begin";
                    break;
                
                case STATE.WAITING:
                    els.mainText.textContent = "Wait...";
                    els.mainText.className = "font-display text-3xl md:text-5xl font-bold text-waiting transition-all duration-200 text-glow";
                    els.subText.textContent = "Watch for green";
                    break;
                
                case STATE.READY:
                    els.mainText.textContent = "NOW!";
                    els.mainText.className = "font-display text-4xl md:text-6xl font-black text-pink-400 text-glow scale-110 transition-all duration-75";
                    els.subText.textContent = "CLICK!";
                    els.subText.className = "text-white text-lg md:text-xl font-bold mt-1";
                    break;
                
                case STATE.RESULT:
                    els.mainText.textContent = `${data} ms`;
                    els.mainText.className = "font-display text-4xl md:text-6xl font-bold text-results text-glow transition-all duration-200";
                    
                    let feedback = "";
                    if (data < 200) feedback = "Superhuman! ⚡";
                    else if (data < 250) feedback = "Lightning fast! 🚀";
                    else if (data < 300) feedback = "Great! 👏";
                    else if (data < 400) feedback = "Good.";
                    else feedback = "Keep practicing.";
                    
                    els.subText.textContent = feedback;
                    els.subText.className = "text-muted text-sm md:text-base font-light mt-1";
                    break;
                
                case STATE.FALSE_START:
                    els.mainText.textContent = "Too Soon!";
                    els.mainText.className = "font-display text-3xl md:text-5xl font-bold text-white text-glow transition-all duration-200";
                    els.subText.textContent = "You clicked before green";
                    els.subText.className = "text-white/80 text-sm md:text-base font-light mt-1";
                    break;
            }
        }

        let scene, camera, renderer, coreGroup, wireMesh, solidMesh, particles;
        let raycaster, mouse;
        let time = 0;
        let targetRotationSpeed = 0.002;
        let currentRotationSpeed = 0.002;
        let isHovering = false;

        function initThree() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0F172A, 0.02);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 7.5);

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x3B82F6, 2, 50);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);
            
            const pointLight2 = new THREE.PointLight(0x10B981, 1.5, 50);
            pointLight2.position.set(-5, -5, 5);
            scene.add(pointLight2);

            createCore();
            createParticles();

            window.addEventListener('resize', onWindowResize, false);
            container.addEventListener('mousemove', onMouseMove, false);
            container.addEventListener('click', onMouseClick, false);
            container.addEventListener('touchstart', onTouchStart, {passive: false});
            
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    handleGameInteraction();
                }
            });

            animate();
        }

        function createCore() {
            coreGroup = new THREE.Group();
            
            const wireGeo = new THREE.IcosahedronGeometry(2.2, 1);
            const wireMat = new THREE.MeshBasicMaterial({ 
                color: 0x3B82F6,
                wireframe: true,
                transparent: true,
                opacity: 0.4
            });
            wireMesh = new THREE.Mesh(wireGeo, wireMat);
            wireMesh.name = "core";
            coreGroup.add(wireMesh);

            const solidGeo = new THREE.IcosahedronGeometry(1.7, 0);
            const solidMat = new THREE.MeshStandardMaterial({
                color: 0x1E293B,
                roughness: 0.3,
                metalness: 0.8,
                emissive: 0x3B82F6,
                emissiveIntensity: 0.3
            });
            solidMesh = new THREE.Mesh(solidGeo, solidMat);
            solidMesh.name = "core";
            coreGroup.add(solidMesh);
            
            scene.add(coreGroup);
        }

        function createParticles() {
            const geometry = new THREE.BufferGeometry();
            const count = 600;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);

            const colorPalette = [
                new THREE.Color(0x3B82F6),
                new THREE.Color(0x10B981),
                new THREE.Color(0xF59E0B)
            ];

            for(let i = 0; i < count; i++) {
                const r = 6 + Math.random() * 4;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i*3+2] = r * Math.cos(phi);

                const col = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i*3] = col.r;
                colors[i*3+1] = col.g;
                colors[i*3+2] = col.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.06,
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function onMouseMove(event) {
            event.preventDefault();
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            checkIntersection();
        }

        function onTouchStart(event) {
            event.preventDefault();
            if (event.touches.length > 0) {
                mouse.x = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.touches[0].clientY / window.innerHeight) * 2 + 1;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(coreGroup.children);
                
                if (intersects.length > 0) {
                    handleGameInteraction();
                }
            }
        }

        function onMouseClick(event) {
            if (isHovering) {
                handleGameInteraction();
            }
        }

        function checkIntersection() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(coreGroup.children);
            
            const container = document.getElementById('canvas-container');
            
            if (intersects.length > 0) {
                if (!isHovering) {
                    isHovering = true;
                    container.style.cursor = 'pointer';
                    document.body.style.cursor = 'pointer';
                }
            } else {
                if (isHovering) {
                    isHovering = false;
                    container.style.cursor = 'default';
                    document.body.style.cursor = 'default';
                }
            }
        }

        function trigger3DAction(action) {
            if (!coreGroup) return;

            if (action === 'READY') {
                targetRotationSpeed = 0.4;
                solidMesh.material.emissive.setHex(0x10B981);
                solidMesh.material.emissiveIntensity = 1;
                wireMesh.material.color.setHex(0x10B981);
                wireMesh.material.opacity = 0.9;
                
                coreGroup.scale.set(1.3, 1.3, 1.3);
                setTimeout(() => {
                    coreGroup.scale.set(1.1, 1.1, 1.1);
                }, 100);

            } else if (action === 'FALSE_START') {
                solidMesh.material.emissive.setHex(0xEF4444);
                solidMesh.material.emissiveIntensity = 1.2;
                solidMesh.material.color.setHex(0x7F1D1D);
                wireMesh.material.color.setHex(0xEF4444);
                wireMesh.material.opacity = 0.9;
                targetRotationSpeed = -0.3;
                
                coreGroup.scale.set(0.9, 0.9, 0.9);
                setTimeout(() => {
                    coreGroup.scale.set(1.05, 1.05, 1.05);
                }, 100);

            } else if (action === 'RESULT') {
                setTimeout(() => {
                    targetRotationSpeed = 0.002;
                    if (currentState !== STATE.FALSE_START) {
                        setWaitingColors();
                    }
                }, 300);
            }
        }

        function reset3DScene() {
            targetRotationSpeed = 0.002;
            setWaitingColors();
            coreGroup.rotation.set(0, 0, 0);
            coreGroup.scale.set(1, 1, 1);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            currentRotationSpeed += (targetRotationSpeed - currentRotationSpeed) * 0.05;

            if (coreGroup) {
                coreGroup.rotation.x += currentRotationSpeed;
                coreGroup.rotation.y += currentRotationSpeed * 0.6;
                
                if (currentState === STATE.IDLE) {
                    coreGroup.position.y = Math.sin(time * 1.5) * 0.15;
                    coreGroup.rotation.y += 0.002;
                } else if (currentState === STATE.WAITING) {
                    coreGroup.position.y = Math.sin(time * 8) * 0.08;
                } else if (currentState === STATE.FALSE_START) {
                    const pulse = 1 + Math.sin(time * 10) * 0.02;
                    coreGroup.scale.x = pulse;
                    coreGroup.scale.y = pulse;
                    coreGroup.scale.z = pulse;
                } else {
                    coreGroup.position.y = 0;
                }

                if (isHovering && currentState !== STATE.READY && currentState !== STATE.FALSE_START) {
                    coreGroup.scale.lerp(new THREE.Vector3(1.1, 1.1, 1.1), 0.1);
                } else if (!isHovering && currentState !== STATE.FALSE_START) {
                    coreGroup.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
                }
            }

            if (particles) {
                particles.rotation.y -= 0.001;
                particles.rotation.x += 0.0005;
            }

            if (!isHovering || (currentState !== STATE.READY && currentState !== STATE.FALSE_START)) {
                checkIntersection();
            }

            renderer.render(scene, camera);
        }
        window.onload = initThree;
    </script>
</body>
</html>
